name: CI

on:
    push:
        branches: ["main", "master", "develop"]
    pull_request:
        branches: ["main", "master", "develop"]

jobs:
    test:
        name: PHP ${{ matrix.php }} / ${{ matrix.os }}
        runs-on: ${{ matrix.os }}

        strategy:
            fail-fast: false
            matrix:
                php: ["8.4"]
                os: [ubuntu-latest]

        services:
            mysql:
                image: mysql:8.0
                env:
                    MYSQL_ROOT_PASSWORD: root
                    MYSQL_DATABASE: gobl_test
                    MYSQL_USER: gobl_test
                    MYSQL_PASSWORD: gobl_test
                ports:
                    - 3306:3306
                options: >-
                    --health-cmd="mysqladmin ping --silent"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5

            postgres:
                image: postgres:15
                env:
                    POSTGRES_PASSWORD: gobl_test
                    POSTGRES_DB: gobl_test
                    POSTGRES_USER: gobl_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd="pg_isready -U gobl_test"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up PHP ${{ matrix.php }}
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  extensions: pdo, pdo_mysql, pdo_pgsql, pdo_sqlite, mbstring, intl
                  coverage: none

            - name: Validate composer.json
              run: composer validate --strict

            - name: Cache Composer dependencies
              uses: actions/cache@v4
              with:
                  path: vendor
                  key: ${{ runner.os }}-php${{ matrix.php }}-composer-${{ hashFiles('composer.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-php${{ matrix.php }}-composer-

            - name: Install Composer dependencies
              env:
                  COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ secrets.GH_PRIVATE_ACCESS_TOKEN }}"}}'
              run: composer install --prefer-dist --no-progress --no-interaction --ignore-platform-reqs

            - name: Create .env.test
              run: |
                  cat > .env.test <<'EOF'
                  GOBL_TEST_MYSQL_HOST=127.0.0.1
                  GOBL_TEST_MYSQL_PORT=3306
                  GOBL_TEST_MYSQL_DB=gobl_test
                  GOBL_TEST_MYSQL_USER=gobl_test
                  GOBL_TEST_MYSQL_PASSWORD=gobl_test
                  GOBL_TEST_POSTGRESQL_HOST=127.0.0.1
                  GOBL_TEST_POSTGRESQL_PORT=5432
                  GOBL_TEST_POSTGRESQL_DB=gobl_test
                  GOBL_TEST_POSTGRESQL_USER=gobl_test
                  GOBL_TEST_POSTGRESQL_PASSWORD=gobl_test
                  GOBL_TEST_SQLITE_FILE=:memory:
                  EOF
                  sed -i 's/^[[:space:]]*//' .env.test

            - name: Run PHPUnit tests
              run: ./vendor/bin/phpunit --no-coverage

            - name: Check code style
              if: matrix.php == '8.4'
              run: vendor/bin/php-cs-fixer fix --dry-run --diff

            - name: Run Psalm static analysis
              if: matrix.php == '8.4'
              run: cat composer.lock & vendor/bin/psalm --version & ./vendor/bin/psalm --no-progress
