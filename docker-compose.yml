services:
    # ------------------------------------------------------------------
    # PHP test runner - built from Dockerfile (extensions + Composer pre-baked)
    # ------------------------------------------------------------------
    php:
        build:
            context: .
            dockerfile: Dockerfile
        working_dir: /app
        volumes:
            - .:/app
            # Named volume for vendor/ so Composer cache survives container restarts
            - gobl_vendor:/app/vendor
        depends_on:
            mysql:
                condition: service_healthy
            postgres:
                condition: service_healthy
        environment:
            GOBL_TEST_MYSQL_HOST: mysql
            GOBL_TEST_MYSQL_PORT: 3306
            GOBL_TEST_MYSQL_DB: gobl_test
            GOBL_TEST_MYSQL_USER: gobl_test
            GOBL_TEST_MYSQL_PASSWORD: gobl_test
            GOBL_TEST_POSTGRESQL_HOST: postgres
            GOBL_TEST_POSTGRESQL_PORT: 5432
            GOBL_TEST_POSTGRESQL_DB: gobl_test
            GOBL_TEST_POSTGRESQL_USER: gobl_test
            GOBL_TEST_POSTGRESQL_PASSWORD: gobl_test
            GOBL_TEST_SQLITE_FILE: ":memory:"

    # ------------------------------------------------------------------
    # MySQL 8
    # ------------------------------------------------------------------
    mysql:
        image: mysql:8.0
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: gobl_test
            MYSQL_USER: gobl_test
            MYSQL_PASSWORD: gobl_test
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "--silent"]
            interval: 5s
            timeout: 5s
            retries: 10

    # ------------------------------------------------------------------
    # PostgreSQL 15
    # ------------------------------------------------------------------
    postgres:
        image: postgres:15
        environment:
            POSTGRES_DB: gobl_test
            POSTGRES_USER: gobl_test
            POSTGRES_PASSWORD: gobl_test
        healthcheck:
            test: ["CMD", "pg_isready", "-U", "gobl_test"]
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    gobl_vendor:
